name: Build UniTracker APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Pillow
      run: pip install Pillow

    - name: Generate app icons
      run: |
        python3 << 'EOF'
        from PIL import Image, ImageDraw, ImageFont
        import os

        sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192,
        }

        for folder, size in sizes.items():
            path = f'app/src/main/res/{folder}'
            os.makedirs(path, exist_ok=True)

            img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            d = ImageDraw.Draw(img)

            radius = int(size * 0.18)
            d.rounded_rectangle([0, 0, size-1, size-1], radius=radius, fill=(10, 92, 54, 255))

            try:
                font_size = int(size * 0.55)
                font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", font_size)
            except:
                font = ImageFont.load_default()

            text = "U"
            bbox = d.textbbox((0, 0), text, font=font)
            tw, th = bbox[2] - bbox[0], bbox[3] - bbox[1]
            tx = (size - tw) // 2 - bbox[0]
            ty = (size - th) // 2 - bbox[1]
            d.text((tx, ty), text, fill=(255, 255, 255, 255), font=font)

            img.save(f'{path}/ic_launcher.png')
            img.save(f'{path}/ic_launcher_round.png')
            print(f'Generated {folder} ({size}x{size})')
        EOF

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Generate gradle wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin
        chmod +x ./gradlew

    - name: Restore keystore from secret OR generate new
      run: |
        mkdir -p ~/.android
        if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
          echo "✓ Restoring keystore from saved secret"
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
        else
          echo "⚠ No saved keystore found, generating fresh one"
          echo "  (You should save the base64 below as DEBUG_KEYSTORE_BASE64 secret)"
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000
        fi

    - name: Print SHA-1 and base64 keystore
      run: |
        echo ""
        echo "================================================================"
        echo "SHA-1 FINGERPRINT (add this to Firebase Console!):"
        echo "================================================================"
        keytool -list -v -keystore ~/.android/debug.keystore \
          -alias androiddebugkey -storepass android -keypass android \
          2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //'
        echo "================================================================"
        echo ""
        echo "================================================================"
        echo "KEYSTORE AS BASE64 (save as GitHub Secret: DEBUG_KEYSTORE_BASE64)"
        echo "================================================================"
        base64 -w 0 ~/.android/debug.keystore
        echo ""
        echo "================================================================"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: UniTracker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
